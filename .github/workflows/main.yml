name: Teste HTML

on:
  push:
      branches: ["main"]

jobs:
  verificar-h1:
    runs-on: ubuntu-latest

    steps:
      - name: baixar o codigo
      - uses: actions/checkout@v4

      - name: verificar se existe <h1>
        run:
          if grep -Eiq "<h1[^>]*> index.html; then
            echo "encontramos a tag <h1>!"
          else
            echo "não encontramos a tag <h1>!"
            exit
          fi
